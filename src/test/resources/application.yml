spring:
  datasource:
    url: jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1
    username: sa
    password:
    driver-class-name: org.h2.Driver

  jpa:
    hibernate:
      ddl-auto: create-drop
    properties:
      hibernate:
        format_sql: true
    show-sql: true

jwt:
  secret: test-secret-key-here-make-it-long-enough-256bit
  access-expiration: 1800000
  refresh-expiration: 604800000